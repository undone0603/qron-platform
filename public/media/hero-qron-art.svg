<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="50%" stop-color="#0d0b00"/>
      <stop offset="100%" stop-color="#050400"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#c9a227" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <linearGradient id="moduleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c547"/>
      <stop offset="100%" stop-color="#a07d10"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="hexBg" x="0" y="0" width="36" height="42" patternUnits="userSpaceOnUse">
      <polygon points="18,2 34,11 34,31 18,40 2,31 2,11" fill="none" stroke="#c9a227" stroke-width="0.35" stroke-opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgGlow)"/>
  <rect width="600" height="600" fill="url(#hexBg)"/>

  <!-- Core glow -->
  <circle cx="300" cy="300" r="200" fill="url(#coreGlow)"/>

  <!-- Orbit rings -->
  <circle cx="300" cy="300" r="240" fill="none" stroke="#c9a227" stroke-width="0.8" stroke-opacity="0.18" stroke-dasharray="10 8"/>
  <circle cx="300" cy="300" r="270" fill="none" stroke="#c9a227" stroke-width="0.5" stroke-opacity="0.1" stroke-dasharray="6 12"/>

  <!-- ─── QR Code body (170×170 centered at 300,300) ─── -->
  <!-- QR outer border -->
  <rect x="130" y="130" width="340" height="340" rx="12" fill="#0a0800" stroke="url(#goldGrad)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="138" y="138" width="324" height="324" rx="8" fill="none" stroke="#c9a227" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- ── Finder pattern: Top-Left ── -->
  <rect x="152" y="152" width="70" height="70" rx="6" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <rect x="162" y="162" width="50" height="50" rx="3" fill="#0a0800" stroke="url(#goldGrad)" stroke-width="2"/>
  <rect x="173" y="173" width="28" height="28" rx="2" fill="url(#goldGrad)"/>

  <!-- ── Finder pattern: Top-Right ── -->
  <rect x="378" y="152" width="70" height="70" rx="6" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <rect x="388" y="162" width="50" height="50" rx="3" fill="#0a0800" stroke="url(#goldGrad)" stroke-width="2"/>
  <rect x="399" y="173" width="28" height="28" rx="2" fill="url(#goldGrad)"/>

  <!-- ── Finder pattern: Bottom-Left ── -->
  <rect x="152" y="378" width="70" height="70" rx="6" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <rect x="162" y="388" width="50" height="50" rx="3" fill="#0a0800" stroke="url(#goldGrad)" stroke-width="2"/>
  <rect x="173" y="399" width="28" height="28" rx="2" fill="url(#goldGrad)"/>

  <!-- ── Data modules (random-looking pattern, top zone) ── -->
  <!-- Row 1 (y=152 area, between finders) -->
  <rect x="236" y="152" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="254" y="152" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="272" y="152" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.7"/>
  <rect x="290" y="152" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="308" y="152" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.6"/>
  <rect x="326" y="152" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="344" y="152" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.8"/>
  <rect x="362" y="152" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>

  <rect x="236" y="170" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.7"/>
  <rect x="272" y="170" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="308" y="170" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.8"/>
  <rect x="344" y="170" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.6"/>

  <!-- Row middle columns (left side) -->
  <rect x="152" y="236" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="152" y="254" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.6"/>
  <rect x="152" y="272" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="152" y="290" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.8"/>
  <rect x="152" y="308" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="152" y="326" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.5"/>
  <rect x="152" y="344" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="152" y="362" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.7"/>

  <!-- Right side columns -->
  <rect x="436" y="236" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="436" y="254" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.7"/>
  <rect x="436" y="272" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="436" y="308" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.6"/>
  <rect x="436" y="326" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="436" y="362" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.8"/>

  <!-- Data field: center scattered modules -->
  <rect x="236" y="236" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.8"/>
  <rect x="254" y="254" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="272" y="236" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.6"/>
  <rect x="290" y="254" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="308" y="236" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.7"/>
  <rect x="326" y="254" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="344" y="236" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.5"/>
  <rect x="362" y="254" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="399" y="236" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.8"/>
  <rect x="418" y="254" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.7"/>

  <!-- Bottom data modules -->
  <rect x="236" y="436" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="254" y="418" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.7"/>
  <rect x="272" y="436" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="308" y="418" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.6"/>
  <rect x="326" y="436" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="344" y="418" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.8"/>
  <rect x="362" y="436" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="399" y="418" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.7"/>
  <rect x="418" y="436" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="418" y="418" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.5"/>

  <!-- Additional center scatter -->
  <rect x="272" y="308" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="290" y="326" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.7"/>
  <rect x="326" y="308" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="344" y="326" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.6"/>
  <rect x="362" y="308" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="399" y="326" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.8"/>
  <rect x="418" y="308" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.7"/>
  <rect x="272" y="362" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.9"/>
  <rect x="308" y="344" width="12" height="12" rx="1.5" fill="url(#moduleGrad)" fill-opacity="0.5"/>

  <!-- ── Center QRON seal (white cutout) ── -->
  <circle cx="300" cy="300" r="52" fill="#0a0800" stroke="url(#goldGrad)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="300" cy="300" r="44" fill="#0d0b00" stroke="#c9a227" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Q letter -->
  <text x="300" y="316" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="44" font-weight="900" fill="url(#goldGrad)" filter="url(#glow)">Q</text>

  <!-- Corner data nodes outside QR -->
  <!-- Top-Left node -->
  <line x1="100" y1="100" x2="140" y2="140" stroke="#c9a227" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4 4"/>
  <circle cx="88" cy="88" r="12" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="88" cy="88" r="5" fill="#c9a227" fill-opacity="0.7"/>

  <!-- Top-Right node -->
  <line x1="500" y1="100" x2="460" y2="140" stroke="#c9a227" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4 4"/>
  <circle cx="512" cy="88" r="12" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="512" cy="88" r="5" fill="#c9a227" fill-opacity="0.7"/>

  <!-- Bottom-Left node -->
  <line x1="100" y1="500" x2="140" y2="460" stroke="#c9a227" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4 4"/>
  <circle cx="88" cy="512" r="12" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="88" cy="512" r="5" fill="#c9a227" fill-opacity="0.7"/>

  <!-- Bottom-Right node -->
  <line x1="500" y1="500" x2="460" y2="460" stroke="#c9a227" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4 4"/>
  <circle cx="512" cy="512" r="12" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="512" cy="512" r="5" fill="#c9a227" fill-opacity="0.7"/>

  <!-- Bottom label -->
  <text x="300" y="572" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-size="11" font-weight="600" letter-spacing="4" fill="#c9a227" fill-opacity="0.6">QRON · QUANTUM RECOGNITION</text>
</svg>
