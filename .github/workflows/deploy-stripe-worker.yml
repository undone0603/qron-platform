name: Deploy Stripe Provisioner

on:
  push:
    branches:
      - main
    paths:
      - 'workers/stripe-webhook/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Edge
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        working-directory: ./workers/stripe-webhook
        run: npm install
        
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: 'workers/stripe-webhook'
          command: deploy src/index.ts --name stripe-provisioner
